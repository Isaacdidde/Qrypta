{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h3 class="mb-3">You're invited 🎉</h3>
    <p class="text-muted">
        Create your account to join <strong>{{ email }}</strong>
    </p>

    <form method="post">
        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" name="full_name" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required
            >
        </div>

        <button class="btn btn-primary w-100">
            Accept Invitation
        </button>
    </form>
</div>
{% endblock %}
