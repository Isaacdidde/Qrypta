{% extends "base.html" %}
{% block content %}

<style>
/* =====================================================
   SECRET VIEW — CONTROLLED DISCLOSURE
===================================================== */

.secret-header h3 {
    color: var(--text-primary);
    font-weight: 700;
    letter-spacing: .4px;
}

.secret-sub {
    color: var(--text-muted);
    font-size: .85rem;
}

/* ===============================
   GLASS PANEL
================================ */
.glass-panel {
    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.02)
    );
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 28px;
}

/* ===============================
   INPUT GROUP
================================ */
.secret-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-soft);
    color: var(--text-primary);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: .2px;
}

.secret-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
}

/* ===============================
   BUTTONS
================================ */
.action-btn {
    border-radius: 999px;
    padding: 8px 18px;
    font-size: .8rem;
    font-weight: 500;
    transition: all .2s ease;
}

.action-outline {
    background: transparent;
    border: 1px solid var(--border-soft);
    color: var(--text-secondary);
}

.action-outline:hover {
    border-color: var(--accent);
    background: rgba(99,102,241,.08);
    color: var(--text-primary);
}

/* ===============================
   SECURITY NOTE
================================ */
.security-note {
    margin-top: 14px;
    color: var(--text-muted);
    font-size: .8rem;
}

/* ===============================
   FOOTER ACTIONS
================================ */
.footer-actions {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>

<div class="container my-5" style="max-width: 720px;">

    <!-- HEADER -->
    <div class="secret-header mb-4">
        <h3 class="mb-1">Secret</h3>
        <div class="secret-sub">
            Decrypted temporarily for this session
        </div>
    </div>

    <!-- SECRET PANEL -->
    <div class="glass-panel">

        <label class="form-label text-muted mb-2">
            Secret Value
        </label>

        <div class="d-flex gap-2">
            <input
                type="password"
                id="secretValue"
                class="secret-input flex-grow-1"
                value="{{ value }}"
                readonly
                autocomplete="off"
            >

            <button
                class="action-btn action-outline"
                type="button"
                onclick="toggleSecret()"
                id="toggleBtn"
            >
                Show
            </button>
        </div>

        <div class="security-note">
            This value is decrypted in memory only and never stored or logged in plaintext.
        </div>

    </div>

    <!-- ACTIONS -->
    <div class="footer-actions">
        <a
            href="{{ request.referrer or url_for('vault.dashboard') }}"
            class="action-btn action-outline"
        >
            ← Back
        </a>

        <button
            class="action-btn action-outline"
            type="button"
            onclick="copySecret()"
        >
            Copy
        </button>
    </div>

</div>

<script>
function toggleSecret() {
    const input = document.getElementById("secretValue");
    const btn = document.getElementById("toggleBtn");

    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
    } else {
        input.type = "password";
        btn.textContent = "Show";
    }
}

function copySecret() {
    const input = document.getElementById("secretValue");
    const previousType = input.type;

    input.type = "text";
    input.select();
    input.setSelectionRange(0, 99999);
    document.execCommand("copy");
    input.type = previousType;

    alert("Secret copied to clipboard");
}
</script>

{% endblock %}
