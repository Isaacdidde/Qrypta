{% extends "base.html" %}
{% block content %}

<style>
/* =====================================================
   SECRET CREATE — FOCUSED & SECURE
===================================================== */

.secret-header h3 {
    color: var(--text-primary);
    font-weight: 700;
    letter-spacing: .4px;
}

.secret-sub {
    color: var(--text-muted);
    font-size: .9rem;
}

/* ===============================
   GLASS PANEL
================================ */
.glass-panel {
    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.02)
    );
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 28px;
}

/* ===============================
   FORM CONTROLS
================================ */
.form-label {
    color: var(--text-primary);
    font-size: .85rem;
    font-weight: 500;
    margin-bottom: 6px;
}

.form-control {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-soft);
    color: var(--text-secondary);
    border-radius: 12px;
    padding: 12px 14px;
}

.form-control::placeholder {
    color: var(--text-muted);
}

.form-control:focus {
    background: rgba(255,255,255,0.06);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
    color: var(--text-primary);
}

/* ===============================
   TEXTAREA
================================ */
textarea.form-control {
    resize: vertical;
    min-height: 120px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: .2px;
}

/* ===============================
   BUTTONS
================================ */
.btn-primary {
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    border: none;
    color: #020617;
    font-weight: 600;
    padding: 10px 22px;
}

.btn-outline-secondary {
    border-color: var(--border-soft);
    color: var(--text-secondary);
    padding: 10px 22px;
}

.btn-outline-secondary:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-primary);
}

/* ===============================
   SECURITY NOTE
================================ */
.security-note {
    background: rgba(99,102,241,.08);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text-muted);
    font-size: .8rem;
    margin-top: 18px;
}
</style>

<div class="container my-5" style="max-width: 640px;">

    <!-- HEADER -->
    <div class="secret-header mb-4">
        <h3 class="mb-1">
            Add Secret
        </h3>
        <div class="secret-sub">
            Vault: <strong>{{ vault.name }}</strong>
        </div>
    </div>

    <div class="glass-panel">

        <form method="post">

            <!-- SECRET NAME -->
            <div class="mb-3">
                <label class="form-label">
                    Secret Name
                </label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="e.g. Production Database Password"
                    required
                >
            </div>

            <!-- SECRET VALUE -->
            <div class="mb-3">
                <label class="form-label">
                    Secret Value
                </label>
                <textarea
                    name="value"
                    class="form-control"
                    placeholder="Paste the secret value here"
                    required
                ></textarea>
            </div>

            <!-- ACTIONS -->
            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary">
                    Save Secret
                </button>

                <a
                    href="{{ url_for('vault.view_vault', vault_id=vault._id) }}"
                    class="btn btn-outline-secondary"
                >
                    Cancel
                </a>
            </div>

            <!-- SECURITY NOTE -->
            <div class="security-note">
                This secret will be encrypted before storage and never logged or displayed in plaintext again.
            </div>

        </form>

    </div>

</div>

{% endblock %}
